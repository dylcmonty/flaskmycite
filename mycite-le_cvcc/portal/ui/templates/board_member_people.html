<section>
  <h2 style="margin:0 0 10px; font-size:13px; letter-spacing:0.04em; text-transform:uppercase;">Board Members</h2>
  {% if people %}
    <div style="display:grid; gap:8px;">
      {% for row in people %}
        <article style="border:1px solid var(--line); border-radius:6px; background:var(--panel-soft); padding:10px;">
          <div style="font-weight:700;">{{ row.display_name or row.msn_id }}</div>
          <div style="font-size:12px; color:var(--subtle);">msn_id: {{ row.msn_id }}</div>
          <div style="font-size:12px; color:var(--subtle);">role: {{ row.role or "board_member" }}</div>
        </article>
      {% endfor %}
    </div>
  {% else %}
    <div style="font-size:12px; color:var(--subtle);">No board_member records available.</div>
  {% endif %}
</section>
